name: RealGM NFL News Scraper

on:
  schedule:
    - cron: "15 11 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "News listing pages to check (0 = all)"
        required: false
        default: "0"
        type: string


permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  scrape:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Notify Supabase — start
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"p_workflow_id": ${{ secrets.WORKFLOW_ID_REALGM_NFL_NEWS_SCRAPER }}, "p_status": "running", "p_run_id": "${{ github.run_id }}"}'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run RealGM NFL News Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '0' }}
          WORKFLOW_ID: ${{ secrets.WORKFLOW_ID_REALGM_NFL_NEWS_SCRAPER }}
          BASE_URL: "https://football.realgm.com"
          NEWS_PATH: "/news/"
          SPORT_LABEL: "NFL"
          SOCIAL_TYPES: "REALGM_NFL,realgm_nfl"
        run: npx ts-node --transpile-only src/realgm-news-scraper.ts

      - name: Notify Supabase — result
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DURATION=$(( $(date +%s) - $START_TIME ))
          STATUS="${{ job.status }}"
          PAYLOAD=$(printf '{"p_workflow_id": ${{ secrets.WORKFLOW_ID_REALGM_NFL_NEWS_SCRAPER }}, "p_status": "%s", "p_duration_secs": %s, "p_run_id": "${{ github.run_id }}"}' "$STATUS" "$DURATION")
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
